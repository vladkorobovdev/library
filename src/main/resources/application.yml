spring:
  application:
    name: library

  datasource:
    url: ${LIBRARY_DB_URL}
    username: ${LIBRARY_DB_USERNAME}
    password: ${LIBRARY_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${WEBHOOK_SECRET}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:${PORT:8080}/api/payments/success?session_id={CHECKOUT_SESSION_ID}}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:${PORT:8080}/api/payments/cancel}
